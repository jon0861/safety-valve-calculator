<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sicherheitsventil‑Berechnung</title>

	<!-- CSS -->
	<link rel="stylesheet" href="css/style.css">

	<!-- JavaScript -->
	<script src="js/core.js"></script>
	<script src="js/ui.js"></script>
	<script src="js/pdf.js"></script>
	<script src="js/export.js"></script>
	<script src="js/history.js"></script>
	
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">
      img/logo.svg
      <span style="margin-left:10px;">Safety Valve Calculator</span>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li
	  <li><a href="berechnung.html">Berechnung</a></li
	  <li><a href="normen.html">Normen</a></li
	  <li><a href="api526.html">API‑526</a></li
	  <li><a href="download.html">Download</a></li
	  <li><a href="History.html">History</a></li
	  <li><a href="kontakt.html">Kontakt</a></li
    </ul>
  </nav>
</header>

<section class="content">

  <h1>Sicherheitsventil‑Berechnung</h1>

  <div class="form-card">

    <label>Norm auswählen</label>
    <select id="norm">
      <option value="ad2000">AD 2000</option>
      <option value="iso4126">ISO 4126</option>
      <option value="asme">ASME VIII</option>
      <option value="api526">API‑526</option>
    </select>

    <label>Überdruck p (bar abs)</label>
    <input type="number" id="pressure" step="0.01">

    <label>Temperatur (°C)</label>
    <input type="number" id="temperature" step="0.1">

    <label>Durchsatz Q</label>
    <input type="number" id="flow" step="0.1">

    <label>Medium</label>
    <select id="medium">
      <option value="gas">Gas</option>
      <option value="steam">Dampf</option>
      <option value="liquid">Flüssigkeit</option>
    </select>

    
	<div style="display:flex; gap:10px; margin-top:10px;">
		<button class="calc-button">Berechnen</button>

		<a href="history.html">
			<button class="secondary">Aus History laden</button>
		</a>
	</div>


  </div>

  <div id="result" class="result-card"></div>

</section>

<footer>
  <p>© 2026 – Safety Valve Engineering Tools</p>
</footer>

</body>
</html>
