<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Berechnung – Safety Valve Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>
<header>
  <nav class="navbar">
    <div class="logo">Safety Valve Calculator</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="berechnung.html" class="active">Berechnung</a></li>
      <li><a href="normen.html">Normen</a></li>
      <li><a href="api526.html">API‑526</a></li>
      <li><a href="download.html">Download</a></li>
      <li><a href="kontakt.html">Kontakt</a></li>
    </ul>
  </nav>
</header>

<section class="content">
  <h1>Berechnung von Sicherheitsventilen</h1>
  <p>Geben Sie die erforderlichen Prozessdaten ein.</p>

  <div class="form-card">
    <label>Norm auswählen</label>
    <select id="norm">
      <option value="ad2000">AD 2000</option>
      <option value="iso4126">ISO 4126</option>
      <option value="asme">ASME VIII</option>
      <option value="api526">API‑526</option>
    </select>

    <label>Überdruck p (bar abs)</label>
    <input type="number" id="pressure" step="0.01">

    <label>Temperatur T (°C)</label>
    <input type="number" id="temperature" step="0.1">

    <label>Massendurchsatz Q</label>
    <input type="number" id="flow" step="0.1">

    <label>Medium</label>
    <select id="medium">
      <option value="gas">Gas</option>
      <option value="steam">Dampf</option>
      <option value="liquid">Flüssigkeit</option>
    </select>

    <button onclick="calculate()">Berechnen</button>
  </div>

  <div id="result" class="result-card"></div>
</section>

<footer>
  <p>© 2026 – Ioannis Thanos – Safety Valve Engineering Tools</p>
</footer>

</body>
</html>
